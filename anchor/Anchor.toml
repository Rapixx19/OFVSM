# @file Anchor.toml
# @summary Anchor workspace configuration for VECTERAI Foundation
# @dependencies anchor-lang, solana-program

[features]
seeds = false
skip-lint = false

[programs.localnet]
vecterai_locker = "Lock1111111111111111111111111111111111111111"

[programs.devnet]
vecterai_locker = "Lock1111111111111111111111111111111111111111"

[programs.mainnet]
vecterai_locker = "Lock1111111111111111111111111111111111111111"

[registry]
url = "https://api.apr.dev"

[provider]
cluster = "Localnet"
wallet = "~/.config/solana/id.json"

[scripts]
test = "yarn run ts-mocha -p ./tsconfig.json -t 1000000 tests/**/*.ts"
